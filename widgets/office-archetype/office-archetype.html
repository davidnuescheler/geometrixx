<div class="office-archetype-quiz" aria-live="polite">
  <div class="office-archetype-bg" aria-hidden="true">
    <span class="office-archetype-float"></span>
    <span class="office-archetype-float"></span>
    <span class="office-archetype-float"></span>
    <span class="office-archetype-float"></span>
    <span class="office-archetype-float"></span>
  </div>

  <section class="office-archetype-panel office-archetype-intro" data-panel="intro">
    <p class="office-archetype-eyebrow"></p>
    <h2 class="office-archetype-headline"></h2>
    <p class="office-archetype-description"></p>
    <p class="office-archetype-time"></p>
  </section>

  <section class="office-archetype-panel office-archetype-question" data-panel="quiz" hidden>
    <div class="office-archetype-progress-dots" role="presentation"></div>
    <p class="office-archetype-step-label"></p>
    <h2 class="office-archetype-question-title" id="office-archetype-q-title"></h2>
    <div class="office-archetype-options" role="radiogroup" aria-labelledby="office-archetype-q-title"></div>
  </section>

  <section class="office-archetype-panel office-archetype-result" data-panel="result" hidden>
    <div class="office-archetype-confetti" aria-hidden="true"></div>
    <p class="office-archetype-result-eyebrow"></p>
    <div class="office-archetype-badge">
      <span class="office-archetype-badge-icon"></span>
    </div>
    <h2 class="office-archetype-result-title"></h2>
    <p class="office-archetype-result-tagline"></p>
    <ul class="office-archetype-traits"></ul>
    <p class="office-archetype-result-roast"></p>
    <p class="office-archetype-result-coworker"></p>
    <div class="office-archetype-result-actions button-wrapper">
      <button type="button" class="button accent office-archetype-share"></button>
      <button type="button" class="button secondary office-archetype-restart"></button>
    </div>
  </section>

  <div class="office-archetype-controls">
    <div class="office-archetype-controls-intro">
      <button type="button" class="button accent office-archetype-start"></button>
    </div>
    <div class="office-archetype-controls-quiz" hidden>
      <div class="button-wrapper office-archetype-nav">
        <button type="button" class="button secondary office-archetype-back" hidden></button>
        <button type="button" class="button primary office-archetype-next" disabled></button>
      </div>
    </div>
  </div>
</div>
